<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Formulario Color</title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>
<body>
	<div th:replace="~{fragmentos :: menu}"></div>
	<div class="container mt-4">
		
		<h1 th:text="${color.uuid != null ? 'Editar Color' : 'Nuevo Color'}" class="mb-4"></h1>
		
		<form th:action="@{${color.uuid == null ? '/rutaColores/guardar' : '/rutaColores/actualizar'}}" method="post" th:object="${color}">
			
			<input type="hidden" th:field="*{uuid}" />

			<div class="mb-3">
				<label class="form-label">Nombre del Color:</label>
				<input type="text" class="form-control" th:field="*{nombre}" />
				<div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</div>
			</div>

			<button type="submit" class="btn btn-success">Guardar</button>
			<a th:href="@{/rutaColores/listar}" class="btn btn-secondary">Cancelar</a>
		</form>
	</div>
</body>
</html>
