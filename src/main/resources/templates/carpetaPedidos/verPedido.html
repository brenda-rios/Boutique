<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalles del Pedido</title>
    <div th:replace="~{fragmentos :: bootstrap}"></div>
</head>
<body>
    <div th:replace="~{fragmentos :: menu}"></div>
    <div class="container mt-4">
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0">Información del Pedido</h3>
                <a th:href="@{/rutaPedidos/listar}" class="btn btn-outline-light btn-sm">Volver al Historial</a>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <h5 class="text-muted">Estado del Pedido</h5>
                        <span th:text="${pedido.estado}" class="badge fs-6" 
                              th:classappend="${pedido.estado.name() == 'COMPLETADO'} ? 'bg-success' : 'bg-warning'"></span>
                    </div>
                    <div class="col-md-6 mb-3">
                        <h5 class="text-muted">Fecha y Hora</h5>
                        <p class="fs-5" th:text="${#temporals.format(pedido.fechaHora, 'dd-MM-yyyy HH:mm')}"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white">
                <h4 class="mb-0">Artículos del Pedido</h4>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Productos</th>
                            <th class="text-center">Cantidad</th>
                            <th class="text-end">Precio Unitario</th>
                            <th class="text-end">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${pedido.detalles.isEmpty()}">
                            <td colspan="4" class="text-center text-muted py-3">Este pedido no tiene productos registrados.</td>
                        </tr>
                        <tr th:each="det : ${pedido.detalles}">
                            <td th:text="${det.descripcionProducto}"></td>
                            <td class="text-center" th:text="${det.cantidad}"></td>
                            <td class="text-end" th:text="'$' + ${det.precioUnitario}"></td>
                            <td class="text-end fw-bold" th:text="'$' + ${det.precioUnitario * det.cantidad}"></td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="table-dark">
                            <td colspan="3" class="text-end fs-5"><strong>Total del Pedido:</strong></td>
                            <td class="text-end fs-5 text-success fw-bold" th:text="'$' + ${pedido.total}"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
        
        <div class="text-center">
            <a th:href="@{'/rutaPedidos/editar/' + ${pedido.uuid}}" class="btn btn-warning btn-lg">Modificar este Pedido</a>
        </div>
    </div>
</body>
</html>
