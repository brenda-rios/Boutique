<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Formulario Detalle Producto</title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>
<body>
	<div th:replace="~{fragmentos :: menu}"></div>
	<div class="container mt-4">
		<h1 th:text="${uuid} != null ? 'Editar Detalle' : 'Nuevo Detalle'" class="mb-4"></h1>
		<form th:action="${uuid} == null ? @{/rutaDetalleProductos/guardar} : @{/rutaDetalleProductos/actualizar}" method="post" th:object="${detalleProducto}">
			<input type="hidden" name="uuid" th:value="${uuid}" />

			<div class="mb-3">
				<label class="form-label">Producto:</label>
				<select class="form-select" th:field="*{idProducto}">
					<option th:each="producto : ${listaProductos}"
						 th:value="${producto.idProducto}"
						 th:text="${producto.nombre}"></option>
				</select>
				<div class="text-danger" th:if="${#fields.hasErrors('idProducto')}" th:errors="*{idProducto}">Error</div>
			</div>

			<div class="mb-3">
				<label class="form-label">Talla:</label>
				<select class="form-select" th:field="*{idTalla}">
					<option th:each="talla : ${listaTallas}"
						 th:value="${talla.idTalla}"
						 th:text="${talla.nombre}"></option>
				</select>
				<div class="text-danger" th:if="${#fields.hasErrors('idTalla')}" th:errors="*{idTalla}">Error</div>
			</div>

			<div class="mb-3">
				<label class="form-label">Color:</label>
				<select class="form-select" th:field="*{idColor}">
					<option th:each="color : ${listaColores}"
						 th:value="${color.idColor}"
						 th:text="${color.nombre}"></option>
				</select>
				<div class="text-danger" th:if="${#fields.hasErrors('idColor')}" th:errors="*{idColor}">Error</div>
			</div>

			<div class="mb-3">
				<label class="form-label">Cantidad:</label>
				<input type="number" class="form-control" th:field="*{cantidad}" />
				<div class="text-danger" th:if="${#fields.hasErrors('cantidad')}" th:errors="*{cantidad}">Error</div>
			</div>

			<div class="mb-3">
				<label class="form-label">Precio:</label>
				<input type="number" step="0.01" class="form-control" th:field="*{precio}" />
				<div class="text-danger" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}">Error</div>
			</div>

			<button type="submit" class="btn btn-success">Guardar</button>
			<a th:href="@{/rutaDetalleProductos/listar}" class="btn btn-secondary">Cancelar</a>
		</form>
	</div>
</body>
</html>
