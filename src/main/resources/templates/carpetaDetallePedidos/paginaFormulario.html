<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Detalle Pedido</title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>
<body>
    <div th:replace="~{fragmentos :: menu}"></div>
    
    <div class="container mt-4">
        <h1 th:text="${detallePedido.uuid} == null ? 'Nuevo Detalle de Pedido' : 'Editar Detalle de Pedido'"></h1>
        
        <form th:action="${detallePedido.uuid} == null ? @{/rutaDetallePedido/guardar} : @{/rutaDetallePedido/actualizar}" th:object="${detallePedido}" method="post">
            <input type="hidden" th:field="*{idDetPed}" />
            <input type="hidden" th:field="*{uuid}" />

            <div class="mb-3">
                <label class="form-label">Pedido:</label>
                <select class="form-select" th:field="*{idPedido}" required>
                    <option value="">-- Seleccione un Pedido --</option>
                    <option th:each="p : ${listaPedidos}" th:value="${p.idPedido}" th:text="${'Pedido #' + p.idPedido}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Producto en Inventario:</label>
                <select class="form-select" th:field="*{idDetProd}" required>
                    <option value="">-- Seleccione un Producto --</option>
					<option th:each="dp : ${listaDetallesProd}" 
					        th:value="${dp.idDetProd}" 
					        th:text="${dp.productoNombre + ' - ' + dp.tallaNombre + ' - ' + dp.colorNombre}">
					</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Cantidad:</label>
                <input type="number" class="form-control" th:field="*{cantidad}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Precio Unitario ($):</label>
                <input type="number" step="0.01" class="form-control" th:field="*{precioUnitario}" required>
            </div>

            <button type="submit" class="btn btn-success">Guardar</button>
            <a th:href="@{/rutaDetallePedido/listar}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
