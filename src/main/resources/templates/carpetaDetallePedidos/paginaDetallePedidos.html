<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalles de Pedidos</title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>
<body>
    <div th:replace="~{fragmentos :: menu}"></div>
    <div th:replace="~{fragmentos :: alertas}"></div>
    
    <div class="container mt-4">
        <h1>Listado de Detalles de Pedido</h1>
        <a th:href="@{/rutaDetallePedido/nuevo}" class="btn btn-primary mb-3" style="background-color: rgb(139, 29, 28);">Nuevo Detalle</a>
        
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                  
                    <th>Pedido</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio Unitario</th>
                    <th>Subtotal</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="det : ${detalles}">
        
                    <td th:text="${det.pedido != null ? 'Pedido #' + det.pedido.idPedido : 'N/A'}"></td>
                    <!-- Aquí mostramos datos enlazados a través de las llaves foráneas -->
                    <td th:text="${det.detalleProducto != null ? det.detalleProducto.producto.nombre + ' - ' + det.detalleProducto.talla.nombre + ' - ' + det.detalleProducto.color.nombre : 'N/A'}"></td>
                    <td th:text="${det.cantidad}"></td>
                    <td th:text="'$' + ${det.precioUnitario}"></td>
                    <td th:text="'$' + ${det.subtotal}"></td>
                    <td>
                        <a th:href="@{'/rutaDetallePedido/editar/' + ${det.uuid}}" class="btn btn-sm btn-warning">✏️ Editar</a>
                        <a th:href="@{'/rutaDetallePedido/eliminar/' + ${det.uuid}}" class="btn btn-sm btn-danger" onclick="return confirm('¿Deseas eliminar este detalle?');">🗑️ Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
