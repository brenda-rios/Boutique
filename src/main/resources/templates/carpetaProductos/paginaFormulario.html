<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Producto</title>
    <div th:replace="~{fragmentos :: bootstrap}"></div>
</head>
<body>
    <div th:replace="~{fragmentos :: menu}"></div>
    <div class="container mt-4">
        <h1 th:text="${uuid != null ? 'Editar Producto' : 'Nuevo Producto'}" class="mb-4"></h1>
		
		<div th:if="${param.errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
		    <strong>¡Atención!</strong> <span th:text="${param.errorMsg}"></span>
		    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
		</div>
		
        <form id="formProducto" th:action="${uuid == null ? '/rutaProductos/guardar' : '/rutaProductos/actualizar'}" method="post" th:object="${producto}">
            <input type="hidden" th:field="*{uuid}" />
            <input type="hidden" th:field="*{idProducto}" />

            <div class="mb-3">
                <label class="form-label">Nombre del Producto:</label>
                <input type="text" class="form-control" th:field="*{nombre}" />
                <div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción:</label>
                <input type="text" class="form-control" th:field="*{descripcion}" />
            </div>

            <div class="mb-3">
                <label class="form-label">Integrante Brenda RV:</label>
                <input type="text" class="form-control" th:field="*{brendaRV}" />
            </div>
            <div class="mb-3">
                <label class="form-label">Integrante Jose Armando BM:</label>
                <input type="text" class="form-control" th:field="*{joseArmandoBM}" />
            </div>
            <div class="mb-3">
                <label class="form-label">Integrante Lizbeth CL:</label>
                <input type="text" class="form-control" th:field="*{lizbethCL}" />
            </div>
            <div class="mb-3">
                <label class="form-label">Integrante Maira PE:</label>
                <input type="text" class="form-control" th:field="*{mairaPE}" />
            </div>

            <div class="mb-3">
                <label class="form-label">Categoría:</label>
                <select class="form-select" th:field="*{idCategoria}">
                    <option value="">-- Selecciona una categoría --</option>
                    <option th:each="c : ${listaCategorias}" th:value="${c.idCategoria}" th:text="${c.nombre}"></option>
                </select>
                <div class="text-danger" th:if="${#fields.hasErrors('idCategoria')}" th:errors="*{idCategoria}">Error</div>
            </div>

            <hr>
            <h3>Detalles del Producto</h3>
            <table class="table table-bordered" id="tablaDetalles">
                <thead class="table-light">
                    <tr>
                        <th>Color</th>
                        <th>Talla</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="detallesBody">
                    <tr th:each="det, stat : *{detalles}">
                        <td>
                            <input type="hidden" th:field="*{detalles[__${stat.index}__].idDetProd}" />
                            <select class="form-select" th:field="*{detalles[__${stat.index}__].idColor}" required>
                                <option value="">Seleccione...</option>
                                <option th:each="c : ${listaColores}" th:value="${c.idColor}" th:text="${c.nombre}"></option>
                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('detalles[__${stat.index}__].idColor')}" th:errors="*{detalles[__${stat.index}__].idColor}">Error</div>
                        </td>
                        <td>
                            <select class="form-select" th:field="*{detalles[__${stat.index}__].idTalla}" required>
                                <option value="">Seleccione...</option>
                                <option th:each="t : ${listaTallas}" th:value="${t.idTalla}" th:text="${t.nombre}"></option>
                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('detalles[__${stat.index}__].idTalla')}" th:errors="*{detalles[__${stat.index}__].idTalla}">Error</div>
                        </td>
                        <td>
                            <input type="number" class="form-control" th:field="*{detalles[__${stat.index}__].cantidad}" required min="0"/>
                            <div class="text-danger" th:if="${#fields.hasErrors('detalles[__${stat.index}__].cantidad')}" th:errors="*{detalles[__${stat.index}__].cantidad}">Error</div>
                        </td>
                        <td>
                            <input type="number" step="0.01" class="form-control" th:field="*{detalles[__${stat.index}__].precio}" required min="0.01"/>
                            <div class="text-danger" th:if="${#fields.hasErrors('detalles[__${stat.index}__].precio')}" th:errors="*{detalles[__${stat.index}__].precio}">Error</div>
                        </td>
                        <td>
                            <button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(this)">-</button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <button type="button" class="btn btn-primary mb-4" onclick="agregarFila()">+ Añadir Detalle</button>


            <button type="submit" class="btn btn-success mb-4">Guardar</button>
            <a th:href="@{/rutaProductos/listar}" class="btn btn-secondary mb-4">Cancelar</a>
        </form>
    </div>

    <script>
        function reindexarFilas() {
            const tbody = document.getElementById('detallesBody');
            const filas = tbody.querySelectorAll('tr');
            filas.forEach((fila, index) => {
                const inputs = fila.querySelectorAll('input, select');
                inputs.forEach(input => {
                    const name = input.getAttribute('name');
                    if (name) {
                        const nuevoName = name.replace(/detalles\[\d+\]/, `detalles[${index}]`);
                        input.setAttribute('name', nuevoName);
                        const id = input.getAttribute('id');
                        if(id) {
                            const nuevoId = id.replace(/detalles\d+\./, `detalles${index}.`);
                            input.setAttribute('id', nuevoId);
                        }
                    }
                });
            });
        }

        function agregarFila() {
            const tbody = document.getElementById('detallesBody');
            const filas = tbody.querySelectorAll('tr');
            if(filas.length === 0) return;
            const ultimaFila = filas[filas.length - 1];
            const nuevaFila = ultimaFila.cloneNode(true);
            
            const inputs = nuevaFila.querySelectorAll('input, select');
            inputs.forEach(input => {
                if (input.type === 'hidden') {
                    input.value = '';
                } else if(input.tagName === 'SELECT') {
                    input.selectedIndex = 0;
                } else {
                    input.value = '';
                }
            });

            // Remover posibles mensajes de error de thymeleaf clonados
            const errores = nuevaFila.querySelectorAll('.text-danger');
            errores.forEach(err => err.remove());

            tbody.appendChild(nuevaFila);
            reindexarFilas();
        }

        function eliminarFila(btn) {
            const tbody = document.getElementById('detallesBody');
            if (tbody.querySelectorAll('tr').length > 1) {
                btn.closest('tr').remove();
                reindexarFilas();
            } else {
                alert('Debe haber al menos un detalle.');
            }
        }
		
		
		

		document.addEventListener("DOMContentLoaded", function() {
		    const form = document.getElementById("formProducto");
		    
		    if(form) {
		        form.addEventListener("submit", function(event) {
		            // Usamos un Set para almacenar las combinaciones únicas
		            let combinacionesVistas = new Set();
		            
		            // Seleccionamos todos los selects de Talla y Color en tu tabla dinámica
		            // Ajusta los selectores si tus name="" o class="" son diferentes
		            let selectTallas = document.querySelectorAll('select[name$=".idTalla"]');
		            let selectColores = document.querySelectorAll('select[name$=".idColor"]');
		            
		            for (let i = 0; i < selectTallas.length; i++) {
		                let idTalla = selectTallas[i].value;
		                let idColor = selectColores[i].value;
		                
		                // Solo validamos si ambos campos tienen un valor seleccionado
		                if (idTalla && idColor) {
		                    let combinacionUnica = idTalla + "-" + idColor;
		                    
		                    if (combinacionesVistas.has(combinacionUnica)) {
		                        // Si ya existe, detenemos el envío del formulario al backend
		                        event.preventDefault(); 
		                        alert("Error: Has ingresado la misma combinación de Talla y Color más de una vez. Por favor, revisa las variantes de tu producto.");
		                        return; // Salimos de la función
		                    }
		                    // Si no existe, la recordamos para la siguiente iteración
		                    combinacionesVistas.add(combinacionUnica);
		                }
		            }
		        });
		    }
		});
		
    </script>
</body>
</html>
