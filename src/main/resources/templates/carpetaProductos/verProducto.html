<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalles del Producto</title>
    <div th:replace="~{fragmentos :: bootstrap}"></div>
</head>
<body>
    <div th:replace="~{fragmentos :: menu}"></div>
    <div class="container mt-4">
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0">Información del Producto</h3>
                <a th:href="@{/rutaProductos/listar}" class="btn btn-outline-light btn-sm">Volver al Catálogo</a>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <h5 class="text-muted">Nombre</h5>
                        <p class="fs-5" th:text="${producto.nombre}"></p>
                    </div>
                    <div class="col-md-6 mb-3">
                        <h5 class="text-muted">Categoría</h5>
                        <p class="fs-5" th:text="${categoriaNombre}"></p>
                    </div>
                    <div class="col-md-12 mb-3">
                        <h5 class="text-muted">Descripción</h5>
                        <p th:text="${producto.descripcion != null and !producto.descripcion.isEmpty() ? producto.descripcion : 'Sin descripción'}"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
                <h4 class="mb-0">Variantes del Producto (Detalles)</h4>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Color</th>
                            <th>Talla</th>
                            <th>Cantidad Disponible</th>
                            <th>Precio Unitario</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${producto.detalles.isEmpty()}">
                            <td colspan="4" class="text-center text-muted py-3">Este producto no tiene variantes registradas.</td>
                        </tr>
                        <tr th:each="det : ${producto.detalles}">
                            <td th:text="${det.colorNombre}"></td>
                            <td th:text="${det.tallaNombre}"></td>
                            <td th:text="${det.cantidad}"></td>
                            <td th:text="'$' + ${det.precio}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="mt-4 text-center">
            <a th:href="@{'/rutaProductos/editar/' + ${producto.uuid}}" class="btn btn-warning">✏️ Editar este Producto</a>
        </div>
    </div>
</body>
</html>
