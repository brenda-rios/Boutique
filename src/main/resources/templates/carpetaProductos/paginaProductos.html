<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Catalogo Productos</title>
    <div th:replace="~{fragmentos :: bootstrap}"></div>
</head>
<body>
    <div th:replace="~{fragmentos :: menu}"></div>
    <div th:replace="~{fragmentos :: alertas}"></div>
    <div class="container mt-4">
        <h1>Catalogo de Productos</h1>
        
        <!-- INICIO DE NUEVO CONTENEDOR CON FLEXBOX -->
        <!-- d-flex: activa el modo flex. justify-content-between: empuja los elementos a los extremos -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            
            <!-- Botón de Nuevo Producto (A la izquierda) -->
            <a th:href="@{/rutaProductos/nuevo}" class="btn btn-primary" style="background-color: rgb(139, 29, 28);">➕ Nuevo Producto</a>

            <!-- Formulario de Filtro (A la derecha) -->
            <form th:action="@{/rutaProductos/listar}" method="get" class="d-flex">
                <select name="categoriaId" class="form-select me-2" style="width: auto; min-width: 180px;">
                    <option value="">Todas las categorías</option>
                    <!-- Generamos las opciones con las categorías que envía el controlador -->
                    <option th:each="cat : ${categorias}" 
                            th:value="${cat.idCategoria}" 
                            th:text="${cat.nombre}"
                            th:selected="${param.categoriaId != null and param.categoriaId == cat.idCategoria}">
                    </option>
                </select>
                <button type="submit" class="btn btn-outline-secondary">🔍 Filtrar</button>
            </form>
        </div>
        <!-- FIN DE NUEVO CONTENEDOR -->

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Nombre del Producto</th>
                    <th>Descripción</th>
                    <th>Integrantes</th>
                    <th>Categoría</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="prod : ${productos}">
                    <td th:text="${prod.nombre}"></td>
                    <td th:text="${prod.descripcion}"></td>
                    <td th:text="${prod.integranteSeleccionado}"></td>
                    <td th:text="${prod.categoria.nombre}"></td>
                    <td>
                        <a th:href="@{'/rutaProductos/ver/' + ${prod.uuid}}" class="btn btn-sm btn-info text-white">Ver Detalles</a>
                        <a th:href="@{'/rutaProductos/editar/' + ${prod.uuid}}" class="btn btn-sm btn-warning">✏️ Editar</a>
                        <a th:href="@{'/rutaProductos/eliminar/' + ${prod.uuid}}" class="btn btn-danger btn-sm" onclick="return confirm('¿Estás seguro de que deseas eliminar este producto y TODAS sus variantes? Esta acción no se puede deshacer.');">❌ Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
