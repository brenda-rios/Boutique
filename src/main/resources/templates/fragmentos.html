<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
	<div th:fragment="bootstrap">
		<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
		<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
	</div>

	<div th:fragment="alertas">
		<div th:if="${param.errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
			<strong>Error:</strong> <span th:text="${param.errorMsg}"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
		</div>
	</div>
	
	<div th:fragment="menu">
		<nav class="navbar navbar-expand-lg" data-bs-theme="dark" style="background-color: rgb(139, 29, 28);">
		  <div class="container-fluid">
		    <a class="navbar-brand" href="#">Boutique</a>
		    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor01" aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
		      <span class="navbar-toggler-icon"></span>
		    </button>
		    <div class="collapse navbar-collapse" id="navbarColor01">
		      <ul class="navbar-nav me-auto">
		        <li class="nav-item">
		          <a class="nav-link" href="#">Home  </a>
				</li>
				<li class="nav-item">
				  <a class="nav-link" th:href="@{/rutaProductos/listar}">Productos </a>
				  </li>
				  <li class="nav-item">
				  <a class="nav-link" th:href="@{/rutaPedidos/listar}">Pedidos</a>
				  </li>
				  <li class="nav-item">
				  <a class="nav-link" th:href="@{/reportes/ventas}">Reportes </a>
		        </li>
		        <li class="nav-item dropdown">
		          <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button" aria-haspopup="true" aria-expanded="false">Catálogos</a>
		          <div class="dropdown-menu">
		            <a class="dropdown-item" th:href="@{/rutaColores/listar}">Colores</a>
		            <a class="dropdown-item" th:href="@{/rutaTallas/listar}">Tallas</a>
					<a class="dropdown-item" th:href="@{/rutaCategorias/listar}">Categorias</a>
		          </div>
		        </li>
		      </ul>
		      <form class="d-flex">
		        <input class="form-control me-sm-2" type="search" placeholder="Search">
		        <button class="btn btn-secondary my-2 my-sm-0" type="submit" fdprocessedid="na6lfc">Search</button>
		      </form>
		    </div>
		  </div>
		</nav>
	</div>
</body>
</html>
