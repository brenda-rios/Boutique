<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Formulario Talla</title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>
<body>
	<div th:replace="~{fragmentos :: menu}"></div>
	<div class="container mt-4">
		<h1 th:text="${uuid} != null ? 'Editar Talla' : 'Nueva Talla'" class="mb-4"></h1>
		<form th:action="${uuid} == null ? @{/rutaTallas/guardar} : @{/rutaTallas/actualizar}" method="post" th:object="${talla}">
			<input type="hidden" name="uuid" th:value="${uuid}" />

			<div class="mb-3">
				<label class="form-label">Nombre de la Talla:</label>
				<input type="text" class="form-control" th:field="*{nombre}" />
				<div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</div>
			</div>

			<button type="submit" class="btn btn-success">Guardar</button>
			<a th:href="@{/rutaTallas/listar}" class="btn btn-secondary">Cancelar</a>
		</form>
	</div>
</body>
</html>
